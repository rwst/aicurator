<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AICurator — Side Panel (Hi-Fi)</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f6f8fa;
    --bg-tabs: #eef2f5;
    --border: #d8dde2;
    --border-strong: #b8c0c8;
    --text: #1f2933;
    --text-muted: #6b7682;
    --text-faint: #9aa3ad;
    --accent: #3da9c9;       /* Reactome teal */
    --accent-deep: #2d8aa8;
    --accent-soft: #e6f3f7;
    --danger: #b94a48;
    --warn: #b3771a;
    --ok: #2f7d4f;
    --disabled-bg: #f1f3f5;
    --disabled-text: #b8bfc6;
    --shadow-sm: 0 1px 2px rgba(20, 30, 40, 0.04);
    --shadow-md: 0 2px 8px rgba(20, 30, 40, 0.08);
    --radius: 6px;
    --radius-sm: 4px;
  }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background: #c9d1d9; /* surrounding host-page neutral */
    font-size: 13px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, select { font-family: inherit; color: inherit; }

  /* Stage that mimics the right-half side panel */
  .stage {
    display: flex; align-items: stretch; justify-content: flex-end;
    height: 100vh; width: 100vw;
  }
  .host-page-hint {
    flex: 1;
    background: repeating-linear-gradient(45deg, #d4dae0 0 12px, #cdd4db 12px 24px);
    display: flex; align-items: center; justify-content: center;
    color: #6b7682; font-size: 13px; letter-spacing: 0.3px;
  }
  .host-page-hint span {
    background: rgba(255,255,255,0.85);
    padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border);
  }

  /* The panel itself */
  .panel {
    width: 480px;
    height: 100vh;
    background: var(--bg);
    border-left: 1px solid var(--border-strong);
    display: flex; flex-direction: row;
    box-shadow: -4px 0 16px rgba(20,30,40,0.06);
  }

  /* Vertical tab strip — LEFT edge per chosen direction */
  .tabs {
    width: 92px;
    flex: 0 0 92px;
    background: var(--bg-tabs);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 4px 0;
  }
  .tab {
    position: relative;
    border: 0;
    background: transparent;
    padding: 14px 6px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: background 120ms, color 120ms;
  }
  .tab:hover:not(:disabled) { background: rgba(61,169,201,0.08); color: var(--text); }
  .tab.active {
    background: var(--bg);
    color: var(--text);
  }
  .tab.active::before {
    content: "";
    position: absolute;
    top: 6px; bottom: 6px; right: -1px;
    width: 3px;
    background: var(--accent);
    border-radius: 2px 0 0 2px;
  }
  .tab:disabled {
    color: var(--disabled-text);
    cursor: not-allowed;
  }
  .tab .lock {
    display: block;
    font-size: 10px;
    margin-top: 4px;
    color: var(--disabled-text);
  }

  /* Panel content area */
  .content {
    flex: 1;
    min-width: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── MAIN TAB ── */
  .header {
    padding: 16px 18px 12px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-soft);
  }
  .header img.logo {
    height: 26px;
    width: auto;
    display: block;
  }
  .header .meta { display: flex; flex-direction: column; line-height: 1.1; }
  .header .meta .app { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .header .meta .ver { font-size: 9px; color: var(--text-faint); margin-top: 2px; font-family: 'Courier New', Courier, monospace; }

  .scroll {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 18px 18px 22px;
  }

  .project-block {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 6px 0 14px;
  }
  .project-block .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text-muted); font-weight: 700;
  }
  .project-block .title {
    font-size: 18px; font-weight: 700; color: var(--text);
    margin-top: -4px; margin-bottom: 4px;
  }
  .field, .select {
    width: 92%;
    height: 36px;
    padding: 0 12px;
    font-size: 13px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .field:focus, .select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,169,201,0.18);
  }
  .field.new {
    border-style: dashed;
    background: #fafbfc;
  }
  .select {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1.5l5 5 5-5' fill='none' stroke='%236b7682' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
  }
  .btn-row {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .btn {
    height: 32px;
    padding: 0 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: background 120ms, border-color 120ms, color 120ms, transform 80ms;
  }
  .btn:hover { background: var(--bg-soft); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent-deep);
    color: #fff;
  }
  .btn.primary:hover { background: var(--accent-deep); }
  .btn.danger {
    color: var(--danger);
    border-color: #d6b3b3;
  }
  .btn.danger:hover { background: #fbf2f2; }
  .btn:disabled {
    background: var(--disabled-bg);
    color: var(--disabled-text);
    border-color: var(--border);
    cursor: not-allowed;
  }
  .btn.primary:disabled {
    background: var(--disabled-bg);
    color: var(--disabled-text);
    border-color: var(--border);
  }

  hr.divider {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  /* Settings — spacious, two-line per field */
  .settings h3 {
    font-size: 13px;
    font-weight: 700;
    margin: 0 0 12px;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .settings .row {
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 12px;
  }
  .settings .row label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .settings .row .field,
  .settings .row .select {
    width: 100%;
    height: 32px;
    font-size: 12px;
  }
  .settings .row .field.mono { font-family: 'Courier New', Courier, monospace; font-size: 12px; }
  .settings .row .help {
    font-size: 10px; color: var(--text-faint); margin-top: 2px;
  }
  .settings .save-hint {
    font-size: 10px; color: var(--text-faint);
    display: flex; align-items: center; gap: 6px; margin-top: 4px;
  }
  .settings .save-hint .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--ok);
  }

  /* ── PROCESS TABS ── */
  .proc {
    display: flex; flex-direction: column; height: 100%;
  }
  .proc .head {
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-soft);
    display: flex; align-items: center; justify-content: space-between;
  }
  .proc .head h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .proc .head h2.disabled { color: var(--disabled-text); }
  .proc .head .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    background: #f0e6d6;
    color: var(--warn);
    border: 1px solid #e3cfa3;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .proc .interactive {
    padding: 18px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 12px;
  }
  .proc .interactive .placeholder {
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 22px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    background: var(--bg-soft);
  }
  .proc .interactive .actions {
    display: flex; align-items: center; gap: 10px;
  }
  .proc .interactive .progress-hint {
    font-size: 11px; color: var(--text-muted);
  }
  .proc .log-wrap {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    background: #1c2128;
  }
  .proc .log-head {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px;
    background: #161b22;
    color: #c9d1d9;
    font-size: 11px;
    border-top: 1px solid #2a313a;
    border-bottom: 1px solid #2a313a;
    letter-spacing: 0.3px;
  }
  .proc .log-head .dots { display: flex; gap: 4px; }
  .proc .log-head .dots span {
    width: 8px; height: 8px; border-radius: 50%; background: #444c56;
  }
  .proc .log {
    flex: 1; min-height: 0;
    overflow: auto;
    padding: 10px 12px 14px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 11.5px;
    line-height: 1.55;
    color: #c9d1d9;
  }
  .proc .log .line { display: flex; gap: 10px; white-space: nowrap; }
  .proc .log .ts   { color: #6b7682; }
  .proc .log .lvl  { width: 48px; flex: 0 0 48px; }
  .proc .log .lvl.info { color: #58a6ff; }
  .proc .log .lvl.ok   { color: #56d364; }
  .proc .log .lvl.warn { color: #e3b341; }
  .proc .log .lvl.err  { color: #f85149; }
  .proc .log .lvl.init { color: #8b949e; }
  .proc .log .msg  { color: #c9d1d9; white-space: pre-wrap; }
  .proc .log .cursor {
    display: inline-block;
    width: 7px; height: 13px; background: #56d364;
    vertical-align: text-bottom;
    animation: blink 1s steps(2) infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Variant switcher (out-of-panel — for review only) */
  .review-bar {
    position: fixed; top: 12px; left: 12px;
    background: rgba(255,255,255,0.94);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 10px;
    z-index: 100;
  }
  .review-bar strong { color: var(--text); font-weight: 700; }
  .review-bar .seg {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .review-bar .seg button {
    border: 0;
    background: #fff;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    color: var(--text-muted);
  }
  .review-bar .seg button.on { background: var(--accent); color: #fff; }
  .review-bar .seg button + button { border-left: 1px solid var(--border); }

  /* Tweaks-managed scrollbar styling */
  .scroll::-webkit-scrollbar, .proc .log::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: #c5cdd4; border-radius: 4px; }
  .scroll::-webkit-scrollbar-thumb:hover { background: #aab3bc; }
  .proc .log::-webkit-scrollbar-thumb { background: #2a313a; border-radius: 4px; }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="host-page-hint"><span>← left half: host page (e.g. reactome.org)</span></div>

  <aside class="panel" id="panel" aria-label="AICurator side panel">
    <nav class="tabs" id="tabs" role="tablist" aria-orientation="vertical">
      <button class="tab active" data-tab="0" role="tab" aria-selected="true">Main</button>
      <button class="tab" data-tab="1" role="tab" aria-selected="false" disabled>Extract<span class="lock">🔒</span></button>
      <button class="tab" data-tab="2" role="tab" aria-selected="false" disabled>Summate<span class="lock">🔒</span></button>
      <button class="tab" data-tab="3" role="tab" aria-selected="false" disabled>Canonize<span class="lock">🔒</span></button>
    </nav>

    <section class="content" id="content"></section>
  </aside>
</div>

<script>
// ── Mock state ─────────────────────────────────────────────
const PROJECTS = [
  'reactome-curation-2026',
  'demo-project-a',
  'pathway-pilot-q3',
];

const SETTINGS = {
  projectsDir: '~/aicurator/projects',
  provider: 'OpenAI',
  modelName: 'gpt-5-mini',
  apiKey: 'sk-proj-abcd1234efgh5678ijkl',
};

const PROVIDERS = ['OpenAI', 'Anthropic', 'Google', 'Local (Ollama)', 'Azure OpenAI'];

let appState = {
  tab: 0,
  projectState: 'created', // 'empty' | 'created' | 'running'
  selectedProject: PROJECTS[0],
  newProjectName: '',
};

// ── Render Main tab ────────────────────────────────────────
function renderMain() {
  const projectExists = appState.projectState !== 'empty';
  const projectOptions = PROJECTS.map(p =>
    `<option ${p === appState.selectedProject ? 'selected' : ''}>${p}</option>`
  ).join('');
  const providerOptions = PROVIDERS.map(p =>
    `<option ${p === SETTINGS.provider ? 'selected' : ''}>${p}</option>`
  ).join('');

  return `
    <header class="header">
      <img class="logo" src="assets/reactome-logo.png" alt="Reactome" />
      <div class="meta">
        <span class="app">AICurator</span>
        <span class="ver">v0.3.1</span>
      </div>
    </header>

    <div class="scroll">
      <div class="project-block">
        <span class="label">Current project</span>
        <select class="select" id="project-select" aria-label="Project">
          ${projectExists ? projectOptions : '<option value="">— no project selected —</option>' + projectOptions}
        </select>
        <input class="field new" id="project-new"
               placeholder="…or type a new project name"
               value="${appState.newProjectName}" />
        <div class="btn-row">
          <button class="btn primary" id="btn-create">Create</button>
          <button class="btn danger"  id="btn-delete" ${projectExists ? '' : 'disabled'}>Delete</button>
          <button class="btn"         id="btn-quit">Quit</button>
        </div>
      </div>

      <hr class="divider" />

      <div class="settings">
        <h3>Settings</h3>

        <div class="row">
          <label for="s-dir">Projects Directory</label>
          <input id="s-dir" class="field mono" value="${SETTINGS.projectsDir}" />
          <span class="help">Synced via chrome.storage.sync</span>
        </div>

        <div class="row">
          <label for="s-provider">AI Model Provider</label>
          <select id="s-provider" class="select">${providerOptions}</select>
        </div>

        <div class="row">
          <label for="s-model">Model Name</label>
          <input id="s-model" class="field mono" value="${SETTINGS.modelName}" />
        </div>

        <div class="row">
          <label for="s-key">API Key</label>
          <input id="s-key" class="field mono" type="password" value="${SETTINGS.apiKey}" />
          <span class="help">Stored synced; visible only on this device</span>
        </div>

        <div class="save-hint"><span class="dot"></span> All changes saved</div>
      </div>
    </div>
  `;
}

// ── Render Process tab (Extract / Summate / Canonize) ─────
const PROC_NAMES = ['', 'Extract', 'Summate', 'Canonize'];

function logLines(state) {
  if (state === 'running') {
    return [
      ['17:42:08', 'init', `Project "${appState.selectedProject}" loaded`],
      ['17:42:09', 'info', 'Reading source directory…'],
      ['17:42:11', 'ok',   '14 files indexed'],
      ['17:42:12', 'info', `Calling provider: ${SETTINGS.provider.toLowerCase()} / ${SETTINGS.modelName}`],
      ['17:42:14', 'warn', 'rate limit at 78%'],
      ['17:42:18', 'ok',   'extraction batch 1/3 complete (3,210 tokens)'],
      ['17:42:22', 'info', 'extraction batch 2/3 …'],
    ];
  }
  return [
    ['—',      'init', 'awaiting Start'],
  ];
}

function renderProc(idx) {
  const projectExists = appState.projectState !== 'empty';
  // Tab i is enabled if projectExists AND (i === 1 OR previous step done — for mock: 'running' enables 1, others stay disabled)
  // Simpler: enable Extract when project loaded; Summate/Canonize when running.
  let enabled = false;
  if (projectExists) {
    if (idx === 1) enabled = true;
    else if (idx === 2) enabled = appState.projectState === 'running';
    else if (idx === 3) enabled = false; // not yet
  }

  const lines = logLines(appState.projectState);
  const logHTML = lines.map(([ts, lvl, msg]) =>
    `<div class="line"><span class="ts">${ts}</span><span class="lvl ${lvl}">[${lvl}]</span><span class="msg">${msg}</span></div>`
  ).join('') + '<div class="line"><span class="ts">&nbsp;</span><span class="lvl"></span><span class="msg"><span class="cursor"></span></span></div>';

  const headBadge = !enabled
    ? `<span class="badge">🔒 finish previous step</span>`
    : appState.projectState === 'running' && idx === 1
      ? `<span class="badge" style="background:#e6f3f7;color:var(--accent-deep);border-color:#b7dde8;">running…</span>`
      : '';

  return `
    <div class="proc">
      <div class="head">
        <h2 class="${enabled ? '' : 'disabled'}">${PROC_NAMES[idx]}</h2>
        ${headBadge}
      </div>

      <div class="interactive">
        <div class="placeholder">
          interactive controls will live here<br/>
          <span style="font-size:11px;">(${PROC_NAMES[idx].toLowerCase()}-specific options to be designed)</span>
        </div>
        <div class="actions">
          <button class="btn primary" ${enabled ? '' : 'disabled'} id="btn-start">▶ Start</button>
          <span class="progress-hint">${enabled ? (appState.projectState === 'running' && idx === 1 ? 'in progress · 38%' : 'ready') : 'locked until previous step completes'}</span>
        </div>
      </div>

      <div class="log-wrap">
        <div class="log-head">
          <span>log · ${PROC_NAMES[idx].toLowerCase()}</span>
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
        <div class="log">${logHTML}</div>
      </div>
    </div>
  `;
}

// ── Tab management & state-driven re-render ──────────────
function syncTabAvailability() {
  const projectExists = appState.projectState !== 'empty';
  document.querySelectorAll('.tabs .tab').forEach(btn => {
    const idx = Number(btn.dataset.tab);
    let enabled = idx === 0;
    if (idx === 1) enabled = projectExists;
    else if (idx === 2) enabled = appState.projectState === 'running';
    else if (idx === 3) enabled = false;
    btn.disabled = !enabled;
    btn.querySelector('.lock')?.style.setProperty('display', enabled ? 'none' : 'block');
  });
}

function setActiveTab(idx) {
  appState.tab = idx;
  document.querySelectorAll('.tabs .tab').forEach(btn => {
    const b = Number(btn.dataset.tab);
    btn.classList.toggle('active', b === idx);
    btn.setAttribute('aria-selected', b === idx ? 'true' : 'false');
  });
  const content = document.getElementById('content');
  content.innerHTML = idx === 0 ? renderMain() : renderProc(idx);
  bindContentEvents();
}

function bindContentEvents() {
  if (appState.tab === 0) {
    document.getElementById('project-select')?.addEventListener('change', e => {
      appState.selectedProject = e.target.value;
    });
    document.getElementById('project-new')?.addEventListener('input', e => {
      appState.newProjectName = e.target.value;
    });
    document.getElementById('btn-create')?.addEventListener('click', () => {
      if (appState.projectState === 'empty') {
        appState.projectState = 'created';
        syncTabAvailability();
        setActiveTab(appState.tab);
      }
    });
    document.getElementById('btn-quit')?.addEventListener('click', () => {
      // close
    });
  } else {
    document.getElementById('btn-start')?.addEventListener('click', () => {
      appState.projectState = 'running';
      syncTabAvailability();
      setActiveTab(appState.tab);
    });
  }
}

// ── Wire tabs (panel) ────────────────────────────────────
document.querySelectorAll('.tabs .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.disabled) return;
    setActiveTab(Number(btn.dataset.tab));
  });
});

// initial render
syncTabAvailability();
setActiveTab(0);
</script>

</body>
</html>
